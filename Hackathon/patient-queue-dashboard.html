<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patient Monitoring Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface-2: #f0f3f7;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text-primary: #111827;
    --text-secondary: #5a6475;
    --text-muted: #9aa3af;
    --teal-50: #e6f7f4;
    --teal-600: #0d8a6f;
    --teal-700: #0a7260;
    --green-50: #ecfaf3;
    --green-600: #16a34a;
    --green-800: #14532d;
    --amber-50: #fffbeb;
    --amber-600: #d97706;
    --amber-800: #78350f;
    --red-50: #fef2f2;
    --red-600: #dc2626;
    --red-800: #7f1d1d;
    --mono: 'DM Mono', monospace;
    --sans: 'Figtree', sans-serif;
    --radius: 12px;
    --radius-sm: 7px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.05);
    --shadow-lg: 0 4px 20px rgba(0,0,0,0.09), 0 0 0 1px rgba(0,0,0,0.06);
  }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .dashboard {
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .pulse-icon {
    width: 44px;
    height: 44px;
    background: var(--teal-600);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pulse-icon svg { width: 24px; height: 24px; }

  .header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; color: var(--text-primary); }
  .header-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--teal-600);
    background: var(--teal-50);
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(13,138,111,0.2);
    margin-top: 2px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--teal-600);
    border-radius: 50%;
    animation: pulse-dot 1.8s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 1.75rem;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent, var(--teal-600));
    border-radius: 2px 2px 0 0;
  }

  .stat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-value { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  /* ── Main panel ── */
  .panel {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }

  .panel-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .panel-meta { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }

  /* ── Table ── */
  .queue-table { width: 100%; border-collapse: collapse; }

  .queue-table thead tr {
    border-bottom: 1px solid var(--border);
  }

  .queue-table th {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-muted);
    padding: 10px 20px;
    text-align: left;
  }

  .queue-table th:last-child { text-align: right; }

  .patient-row {
    border-bottom: 1px solid var(--border);
    transition: background 0.2s ease;
    animation: row-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes row-in {
    from { opacity: 0; transform: translateY(-8px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .patient-row:last-child { border-bottom: none; }
  .patient-row:hover { background: var(--surface-2); }

  .queue-table td {
    padding: 14px 20px;
    font-size: 14px;
    vertical-align: middle;
  }

  /* Position column */
  .pos-cell { display: flex; align-items: center; gap: 10px; }

  .pos-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .pos-1 { background: #fef3c7; color: #92400e; }
  .pos-2 { background: var(--surface-2); color: var(--text-secondary); }
  .pos-3 { background: var(--surface-2); color: var(--text-secondary); }
  .pos-4 { background: var(--surface-2); color: var(--text-secondary); }
  .pos-5 { background: var(--surface-2); color: var(--text-secondary); }

  /* Patient name */
  .patient-name { font-weight: 500; font-size: 14px; }
  .patient-id { font-size: 11px; font-family: var(--mono); color: var(--text-muted); margin-top: 1px; }

  /* Heart rate */
  .hr-value {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
  }

  .hr-unit { font-size: 11px; color: var(--text-muted); margin-left: 2px; font-family: var(--sans); }

  .hr-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--surface-2);
    margin-top: 5px;
    width: 80px;
    overflow: hidden;
  }

  .hr-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease, background 0.4s ease;
  }

  /* Priority badge */
  .priority-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .priority-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .badge-low  { background: var(--green-50); color: var(--green-800); }
  .badge-low .dot { background: var(--green-600); }

  .badge-medium { background: var(--amber-50); color: var(--amber-800); }
  .badge-medium .dot { background: var(--amber-600); }

  .badge-high { background: var(--red-50); color: var(--red-800); }
  .badge-high .dot { background: var(--red-600); animation: pulse-dot 1.2s ease-in-out infinite; }

  /* Trend arrow */
  .trend { font-size: 13px; text-align: right; }
  .trend-up { color: var(--red-600); }
  .trend-flat { color: var(--text-muted); }

  /* ── Footer / button ── */
  .panel-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface-2);
  }

  .footer-note { font-size: 12px; color: var(--text-muted); }

  .sim-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--teal-600);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .sim-btn:hover { background: var(--teal-700); }
  .sim-btn:active { transform: scale(0.97); }

  .sim-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1f2937;
    color: #f9fafb;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 560px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .queue-table th:nth-child(4), .queue-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="pulse-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 12 6 12 9 4 12 20 15 12 18 12 21 12"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Patient Monitoring Dashboard</div>
        <div class="header-sub">Adaptive Queue — Emergency Triage</div>
      </div>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span> Live Monitoring
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card" style="--accent: var(--teal-600)">
      <div class="stat-label">Total Patients</div>
      <div class="stat-value" id="stat-total">5</div>
      <div class="stat-sub">Active in queue</div>
    </div>
    <div class="stat-card" style="--accent: var(--red-600)">
      <div class="stat-label">High Priority</div>
      <div class="stat-value" id="stat-high">0</div>
      <div class="stat-sub">Needs immediate care</div>
    </div>
    <div class="stat-card" style="--accent: var(--amber-600)">
      <div class="stat-label">Avg Heart Rate</div>
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-sub">BPM across queue</div>
    </div>
  </div>

  <!-- Queue panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Active Patient Queue</span>
      <span class="panel-meta" id="last-updated">Updated just now</span>
    </div>

    <table class="queue-table" aria-label="Patient queue ordered by priority">
      <thead>
        <tr>
          <th style="width:48px">#</th>
          <th>Patient</th>
          <th>Heart Rate</th>
          <th>Priority</th>
          <th style="text-align:right">Trend</th>
        </tr>
      </thead>
      <tbody id="queue-body"></tbody>
    </table>

    <div class="panel-footer">
      <span class="footer-note" id="sim-count">Simulation run: 0 times</span>
      <button class="sim-btn" id="sim-btn" onclick="simulateChange()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Simulate Condition Change
      </button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const patients = [
    { id: 'P-1041', name: 'Maria Santos',   hr: 78,  changed: false },
    { id: 'P-1052', name: 'James Okafor',   hr: 95,  changed: false },
    { id: 'P-1063', name: 'Priya Mehta',    hr: 62,  changed: false },
    { id: 'P-1074', name: 'David Chen',     hr: 105, changed: false },
    { id: 'P-1085', name: 'Elena Vasquez',  hr: 88,  changed: false },
  ];

  let simCount = 0;

  function getPriority(hr) {
    if (hr < 90)  return 'Low';
    if (hr <= 110) return 'Medium';
    return 'High';
  }

  function getHrColor(hr) {
    if (hr < 90)   return '#16a34a';
    if (hr <= 110) return '#d97706';
    return '#dc2626';
  }

  function getHrBarPct(hr) {
    return Math.min(100, Math.round((hr / 160) * 100));
  }

  function sortPatients() {
    const order = { 'High': 0, 'Medium': 1, 'Low': 2 };
    patients.sort((a, b) => {
      const pa = order[getPriority(a.hr)], pb = order[getPriority(b.hr)];
      if (pa !== pb) return pa - pb;
      return b.hr - a.hr;
    });
  }

  function updateStats() {
    const high = patients.filter(p => getPriority(p.hr) === 'High').length;
    const avg  = Math.round(patients.reduce((s, p) => s + p.hr, 0) / patients.length);
    document.getElementById('stat-high').textContent = high;
    document.getElementById('stat-avg').textContent  = avg;

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  }

  function renderQueue() {
    sortPatients();
    const tbody = document.getElementById('queue-body');
    tbody.innerHTML = '';

    patients.forEach((p, i) => {
      const priority = getPriority(p.hr);
      const badgeClass = priority === 'High' ? 'badge-high' : priority === 'Medium' ? 'badge-medium' : 'badge-low';
      const hrColor = getHrColor(p.hr);
      const pct = getHrBarPct(p.hr);
      const trendHTML = p.changed
        ? `<span class="trend trend-up" title="Rising">&#9650; Rising</span>`
        : `<span class="trend trend-flat">&#8212;</span>`;

      const tr = document.createElement('tr');
      tr.className = 'patient-row';
      tr.style.animationDelay = `${i * 55}ms`;
      tr.innerHTML = `
        <td>
          <div class="pos-cell">
            <div class="pos-num pos-${i + 1}">${i + 1}</div>
          </div>
        </td>
        <td>
          <div class="patient-name">${p.name}</div>
          <div class="patient-id">${p.id}</div>
        </td>
        <td>
          <div>
            <span class="hr-value" style="color:${hrColor}">${p.hr}</span>
            <span class="hr-unit">BPM</span>
          </div>
          <div class="hr-bar">
            <div class="hr-fill" style="width:${pct}%; background:${hrColor}"></div>
          </div>
        </td>
        <td>
          <span class="priority-badge ${badgeClass}">
            <span class="dot"></span>${priority}
          </span>
        </td>
        <td>${trendHTML}</td>
      `;
      tbody.appendChild(tr);
    });

    updateStats();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function simulateChange() {
    const eligible = patients.filter(p => p.hr < 135);
    if (!eligible.length) { showToast('All patients at maximum levels.'); return; }

    const pick = eligible[Math.floor(Math.random() * eligible.length)];
    const increase = Math.floor(Math.random() * 15) + 8;
    const oldHr = pick.hr;
    const oldPriority = getPriority(oldHr);

    pick.hr = Math.min(140, pick.hr + increase);
    pick.changed = true;
    const newPriority = getPriority(pick.hr);

    simCount++;
    document.getElementById('sim-count').textContent = `Simulation run: ${simCount} time${simCount === 1 ? '' : 's'}`;

    const priorityChanged = oldPriority !== newPriority;
    const msg = priorityChanged
      ? `${pick.name}: ${oldHr}→${pick.hr} BPM · Priority ${oldPriority}→${newPriority}`
      : `${pick.name}: ${oldHr}→${pick.hr} BPM · Still ${newPriority}`;

    renderQueue();
    showToast(msg);
  }

  renderQueue();
</script>
</body>
</html>
